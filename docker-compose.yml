# CodeForge OJ — Development Docker Compose
# Usage: docker-compose up -d
# This spins up MongoDB + Redis only.
# Backend and frontend run natively (hot-reload via nodemon/Vite).

version: "3.9"

services:
  # ─── MongoDB ─────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: codeforge_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: codeforge
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - codeforge_net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/codeforge --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: codeforge_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - codeforge_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Mongo Express (DB GUI — dev only) ───────────────────────────
  mongo-express:
    image: mongo-express:1.0.2
    container_name: codeforge_mongoui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: rootpassword
      ME_CONFIG_MONGODB_URL: mongodb://root:rootpassword@mongo:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - codeforge_net

  # ─── Redis Commander (Redis GUI — dev only) ───────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: codeforge_redisui
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis
    networks:
      - codeforge_net

networks:
  codeforge_net:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
